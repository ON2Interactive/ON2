<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="application-name" content="ON2 Interactive" />
    <meta name="description" content="About ON2 Interactive." />
    <link rel="icon" type="image/png" href="/Favicon/1x/ON2Icon-32x32.png" />
    <title>About | ON2 Interactive</title>
    <style>
      :root {
        --bg: #f5f0e7;
        --text: #171717;
        --text-muted: rgba(23, 23, 23, 0.66);
        --line: rgba(23, 23, 23, 0.1);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 100%;
      }
      body {
        font-family: "Helvetica", "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
        background:
          linear-gradient(rgba(23, 23, 23, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(23, 23, 23, 0.035) 1px, transparent 1px),
          var(--bg);
        background-size: 18px 18px;
      }
      .page {
        min-height: 100vh;
        padding-top: 60px;
      }
      .nav {
        position: fixed;
        inset: 0 0 auto 0;
        z-index: 10;
        width: 100%;
        height: 60px;
        background: rgba(245, 240, 231, 0.82);
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(8px);
      }
      .nav-inner {
        width: 100%;
        height: 60px;
        padding: 0 22px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .logo {
        display: inline-flex;
        align-items: center;
        height: 60px;
        text-decoration: none;
      }
      .logo img {
        width: 32px;
        height: 32px;
      }
      .nav-link {
        color: var(--text);
        text-decoration: none;
        font-size: 15px;
      }
      .page-hero {
        position: relative;
        min-height: 50vh;
        display: flex;
        align-items: flex-end;
        background: #d7ccbe;
        overflow: hidden;
      }
      .page-hero-media {
        position: absolute;
        inset: 0;
        background: url("/Assets/Hero-Latest.png") center center / cover no-repeat;
      }
      .page-hero-overlay {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(18, 13, 10, 0.32) 0%, rgba(18, 13, 10, 0.22) 28%, rgba(245, 240, 231, 0.24) 62%, rgba(245, 240, 231, 0.82) 100%),
          linear-gradient(90deg, rgba(18, 13, 10, 0.28) 0%, rgba(18, 13, 10, 0.08) 22%, rgba(18, 13, 10, 0.08) 78%, rgba(18, 13, 10, 0.3) 100%);
      }
      .page-hero-inner {
        position: relative;
        z-index: 1;
        width: min(1100px, calc(100% - 40px));
        margin: 0 auto;
        padding: 0 0 34px;
      }
      .page-hero-kicker {
        margin: 0 0 10px;
        color: rgba(23, 23, 23, 0.62);
        font-size: 14px;
        line-height: 1.4;
      }
      .page-hero-title {
        margin: 0;
        max-width: 860px;
        font-size: clamp(3.2rem, 7vw, 6rem);
        line-height: 0.94;
        letter-spacing: -0.05em;
      }
      .page-body {
        width: min(1100px, calc(100% - 40px));
        margin: 0 auto;
        padding: 44px 0 96px;
      }
      .page-sections {
        width: min(760px, 100%);
        margin: 100px auto 0;
      }
      .page-block-title {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
        line-height: 1.2;
        color: #1a1a1a;
      }
      .site-footer {
        background-color: #efe6d8;
        background-image:
          linear-gradient(rgba(23, 23, 23, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(23, 23, 23, 0.04) 1px, transparent 1px);
        background-size: 24px 24px;
        min-height: 600px;
        padding: 50px 20px;
        border-top: 1px solid rgba(23, 23, 23, 0.08);
      }
      .site-footer-inner {
        width: min(1400px, 100%);
        margin: 0 auto;
        min-height: calc(600px - 136px);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: flex-end;
      }
      .site-footer-top {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
        width: 100%;
        padding-bottom: 24px;
        margin-bottom: 24px;
      }
      .site-footer-logo-link {
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        margin-bottom: 20px;
        color: #1a1a1a;
      }
      .site-footer-logo {
        display: block;
        width: 72px;
        height: 72px;
      }
      .site-footer-links {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
        text-align: right;
      }
      .site-footer-links a {
        color: rgba(23, 23, 23, 0.72);
        text-decoration: none;
        font-size: 15px;
      }
      .site-footer-social {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 4px;
      }
      .site-footer-social a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        color: #2a2a2a;
      }
      .site-footer-social svg {
        width: 18px;
        height: 18px;
      }
      .site-footer-bottom {
        width: 100%;
        display: flex;
        justify-content: flex-start;
      }
      .site-footer-bottom p {
        margin: 0;
        color: rgba(23, 23, 23, 0.56);
        font-size: 14px;
      }
      @media (max-width: 720px) {
        .page {
          padding-top: 56px;
        }
        .nav,
        .nav-inner,
        .logo {
          height: 56px;
        }
        .page-hero-inner,
        .page-body {
          width: min(1100px, calc(100% - 32px));
        }
        .page-hero-title,
        .page-block-title {
          font-size: 18px;
          line-height: 1.15;
          letter-spacing: -0.01em;
        }
        .page-body {
          padding: 32px 0 72px;
        }
        .site-footer {
          min-height: 420px;
          padding: 36px 16px;
        }
        .site-footer-inner {
          min-height: calc(420px - 96px);
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="nav">
        <div class="nav-inner">
          <a class="logo" href="/" aria-label="ON2 Interactive Home">
            <img src="/Favicon/SVG/ON2Icon-32x32.svg" alt="ON2 Interactive" />
          </a>
          <a class="nav-link" href="/">Back</a>
        </div>
      </header>

      <main>
        <section class="page-hero">
          <div class="page-hero-media"></div>
          <div class="page-hero-overlay"></div>
          <div class="page-hero-inner">
            <p class="page-hero-kicker">About</p>
            <h1 class="page-hero-title">ON2</h1>
          </div>
        </section>

        <section class="page-body">
          <div class="page-sections">
            <h2 class="page-block-title">ON2</h2>
          </div>
        </section>
      </main>

      <footer class="site-footer" aria-label="ON2 Interactive footer">
        <div class="site-footer-inner">
          <div class="site-footer-top">
            <a class="site-footer-logo-link" href="/" aria-label="ON2 Interactive Home">
              <img src="/Favicon/SVG/ON2Icon-32x32.svg" alt="ON2 Interactive" class="site-footer-logo" />
            </a>
            <nav class="site-footer-links" aria-label="Footer">
              <a href="/">Home</a>
              <a href="/about">About</a>
              <a href="/contact">Contact</a>
            </nav>
            <div class="site-footer-social" aria-label="Social links">
              <a href="https://www.linkedin.com/company/on2interactive/" aria-label="LinkedIn" target="_blank" rel="noreferrer">
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <path d="M6.94 8.5H3.56V20h3.38V8.5Zm-1.69-5A1.96 1.96 0 0 0 3.25 5.45c0 1.07.79 1.94 1.96 1.94h.02c1.2 0 1.96-.87 1.96-1.94A1.92 1.92 0 0 0 5.27 3.5h-.02ZM20.75 12.9c0-3.46-1.85-5.07-4.31-5.07-1.99 0-2.88 1.09-3.38 1.86V8.5H9.69c.04.79 0 11.5 0 11.5h3.37v-6.42c0-.34.03-.68.12-.93.27-.68.89-1.38 1.92-1.38 1.35 0 1.89 1.03 1.89 2.54V20H20.75l-.01-7.1Z"/>
                </svg>
              </a>
              <a href="https://www.facebook.com/ON2Interactive/" aria-label="Facebook" target="_blank" rel="noreferrer">
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <path d="M13.5 21v-8.05h2.7l.4-3.15h-3.1V7.79c0-.91.25-1.53 1.56-1.53H16.7V3.44c-.29-.04-1.28-.12-2.43-.12-2.4 0-4.04 1.46-4.04 4.15v2.33H7.5v3.15h2.73V21h3.27Z"/>
                </svg>
              </a>
            </div>
          </div>
          <div class="site-footer-bottom">
            <p>© <span id="footerYear"></span> ON2 Interactive. All rights reserved.</p>
          </div>
        </div>
      </footer>
    </div>

    <script>
      (() => {
        const footerYear = document.getElementById("footerYear");
        if (footerYear) footerYear.textContent = String(new Date().getFullYear());
      })();
    </script>
  </body>
</html>
